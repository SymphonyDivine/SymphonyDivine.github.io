<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mebay Product Page</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        
        <!-- flexbox container -->
        <div id="layout">

            <!-- flexbox item -->
            <div id="thumbnail-column">

                <img
                    src="images/main book.webp" 
                    alt="main image again"
                >

                <img
                    src="images/book 2.webp" 
                    alt="books image 2"
                >

                <img 
                    src="images/book 3.webp" 
                    alt="books image 3"
                >

                <img 
                    src="images/book 4.webp" 
                    alt="books image 4"
                >

                <img 
                    src="images/book 5.webp" 
                    alt="books image 5"
                >

            </div>

            <!-- flexbox item -->
            <div id="featured-image-column">

                <img 
                    src="images/main book.webp" 
                    alt="main book image"
                >

            </div>

            <!-- flexbox items -->
            <div id="product-info-column">

                <h1>
                    Legacy of Gods Series Dark Romance by Rina Kent: Complete 
                    6 Books Set
                </h1>

                <div id="seller-info">

                    <h4 
                        class="sellers-name">StStephensBooks 
                        <span class="gray font-size-2">(41061)</span>
                    </h4>

                    <div id="extra-seller-info">

                        <a href="#" class="font-size">99.9% positive</a>
                        

                        
                        <a href="#" class="font-size">Seller's other items</a>
                        

                        
                        <a href="#" class="font-size">Message seller</a>

                    </div>

                    

                </div>

                <div id="pricing-info">

                    <h2>US $39.53</h2>

                    <p>
                        or 4 interest-free payments of $9.88 available with

                        <span class="bold">Klarna.</span>

                        <a href="#" class="black font-size learn-more">Learn more</a>
                        
                    </p>

                </div>

                <div id="condition-info">

                    <div class="condition">
                        Condition:
                    </div>

                    <div>
                        <span class="bold">Brand New</span>
                    </div>

                </div>

                <div id="all-buttons">

                    <div id="button-1">

                        <a href="#" class="solid-button">

                            <span class="bold">Buy It Now</span>

                        </a>

                    </div>

                    <div id="buttons-2" class="black">

                        <a href="#" class="border-button1">

                            <span class="bold">Add to cart</span>

                        </a>

                    </div>

                    <div id="buttons-3" class="black">

                        <a href="#" class="border-button2">

                            <span class="bold">Add to wishlish</span>

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </body>
</html>
