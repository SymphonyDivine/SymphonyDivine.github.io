<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating Color Palettes</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        
        <h1>
            <span id="span-1">My Floating Color Palettes</span>

        </h1>

        <hr>

        <div class="color-palette">

            <h2>Pastel Dunes</h2>

            <h4 class="color" id="color-1">#DDFFD9</h4>
            <h4 class="color" id="color-2">#ECC8AE</h4>
            <h4 class="color" id="color-3">#D7907B</h4>
        </div>

        <div class="color-palette">

            <h2>Seafoam Dream</h2>

            <h4 class="color" id="color-4">#5D737E</h4>
            <h4 class="color" id="color-5">#64B6AC</h4>
            <h4 class="color" id="color-6">#C0FDFB</h4>
        </div>

        <div class="color-palette">

            <h2>Orchid Mist</h2>

            <h4 class="color" id="color-7">#D2F1E4</h4>
            <h4 class="color" id="color-8">#FBCAEF</h4>
            <h4 class="color" id="color-9">#F865B0</h4>
        </div>

    </body>
</html>
