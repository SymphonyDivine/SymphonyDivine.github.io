<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cards Demo</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>

        <div id="single-column">

            <!-- flexbox container -->
            <div id="card-container">

                <!-- felxbox item -->
                <div class="card" id="green">
                    
                    <h3>Roronoa Zoro</h3>

                    <img src="images/zoro.jpg" class="profile-images">

                    <p>
                        "Scars on the back are a swordman's shame."
                    </p>

                    <br><br>

                    <a href="#" class="button background-3">See Profile</a>

                </div>

                <!-- felxbox item -->
                <div class="card wide" id="red">
                    
                    <h3>Monkey D. Luffy</h3>

                    <img src="images/luffy.jpg" class="profile-images">

                    <p>
                        "My name is Monkey D. Luffy and I'm going to be KING 
                        OF THE PRIATES!"
                    </p>

                    <br><br>

                    <a href="#" class="button background-1">See Profile</a>

                </div>

                <!-- felxbox item -->
                <div class="card" id="yellow">
                    
                    <h3>Black Leg Sanji</h3>

                    <img src="images/sanji.jpg" class="profile-images">

                    <p>
                        "A men who can't wipe away a wonman's tears isn't a 
                        real man."
                    </p>

                    <br><br>

                    <a href="#" class="button background-2">See Profile</a>

                </div>

            </div>

        </div>

    </body>
</html>
