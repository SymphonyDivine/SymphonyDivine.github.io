<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Text Styling Elements</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        This text is not bold<br>

        <b>This text is bold</b><br>
            <b>
                This text is also bold
            </b>

            <p>
                This is <br>
                <b>bolded text</b><br>
                in a paragraph
            </p>
            <hr>
            This text is not italic<br>

            <i>This text IS italic</i><br>

            <i>
                This text is also italic
            </i>

            <p>
                This is 
                <i>italic text</i> 
                in a paragraph
            </p>
            <hr>

            <p>
                This text has as superscript.<sup>1,2</sup>
            </p>

            <p>
                This text has a subscript.<sub>H</sub>
            </p>

    </body>
</html>
