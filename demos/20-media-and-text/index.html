<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media and Text Demo</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>

        <div id="single-column">
            
            <!-- flexbox container -->
            <div id="side-by-side-container">

                <img 
                    src="images/cereal-3.jpg" 
                    alt="cereal"
                >

                <h2>Doesn't this look deliicious?</h2>

            </div>

            <!-- flexbox container -->
            <div id="side-by-side-container-adv">

                <div class="image-container">

                    <img 
                        src="images/cereal-3.jpg" 
                        alt="cereal"
                    >

                </div>

                <div class="text-container">

                    <h2>Doesn't this look deliicious?</h2>

                    <p>
                        Lorem ipsum dolor sit, amet consectetur adipisicing 
                        elit. Ipsa laudantium consectetur amet hic! Omnis 
                        cupiditate deleniti harum quisquam quia magni itaque, 
                        atque deserunt id animi distinctio officiis minus quis 
                        voluptas!
                    </p>

                </div>

            </div>

        </div>

    </body>
</html>
